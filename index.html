<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>78-0</title>
<style>
:root{
  --bg:#07101f;
  --panel:#101a33;
  --panel2:#0c1428;
  --line:#243255;
  --gold:#ffd24a;
  --text:#f4f7ff;
  --muted:#aab5d6;
  --good:#69f0ae;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#07101f,#0b1630 60%,#07101f);
  color:var(--text);
  overflow-x:hidden;
}
.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:20px;
  position:relative;
  z-index:1;
}
h1{
  margin:0 0 8px;
  font-size:64px;
  letter-spacing:.08em;
  text-align:center;
  font-weight:900;
}
.grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:16px;
}
.card{
  background:rgba(16,26,51,.95);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  position:relative;
  overflow:hidden;
}
.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
button{
  border:0;
  border-radius:12px;
  padding:11px 14px;
  font-weight:700;
  cursor:pointer;
}
.primary{
  background:var(--gold);
  color:#111;
}
.secondary{
  background:#15213d;
  color:var(--text);
  border:1px solid var(--line);
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#1b2745;
  color:var(--muted);
  margin:4px 6px 0 0;
  font-size:13px;
}
.small{
  color:var(--muted);
  font-size:14px;
}
.hidden{display:none}
.list button{
  width:100%;
  text-align:left;
  margin:6px 0;
  background:#15213d;
  color:var(--text);
  border:1px solid var(--line);
}
.table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
.table td,.table th{
  border-bottom:1px solid #223055;
  padding:8px 6px;
  text-align:left;
  font-size:14px;
}
.slotWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:14px;
}
.slot{
  background:#0b1325;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  text-align:center;
  overflow:hidden;
  position:relative;
}
.slotLabel{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.reel{
  height:64px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:900;
  line-height:1;
  border-radius:10px;
  background:linear-gradient(180deg,#15213d,#101a33);
  position:relative;
  transform:translateZ(0);
}
.reel.spinning{
  animation:reelPulse .18s linear infinite, reelGlow .5s ease-in-out infinite alternate;
}
.reel.spinning::after{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:12px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  animation:sheen .8s linear infinite;
  pointer-events:none;
}
.flash{margin-top:12px;color:#fff}
.spinCard{position:relative}
.spinCard.shake{animation:shake .55s cubic-bezier(.36,.07,.19,.97) both}
.pickPulse{animation:pickPulse .55s ease both}
.finalOverlay{
  position:fixed;
  inset:0;
  background:rgba(4,9,22,.92);
  backdrop-filter:blur(2px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20;
  opacity:0;
  pointer-events:none;
  transition:opacity .7s ease;
}
.finalOverlay.show{
  opacity:1;
  pointer-events:auto;
}
.finalPanel{
  width:min(460px,92vw);
  background:linear-gradient(180deg,rgba(16,26,51,.98),rgba(10,18,38,.98));
  border:1px solid var(--line);
  border-radius:28px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  position:relative;
  overflow:hidden;
}
.finalPanel::before{
  content:'';
  position:absolute;
  inset:-30%;
  background:radial-gradient(circle at top,rgba(255,210,74,.14),transparent 50%);
  pointer-events:none;
}
.confettiLayer{
  position:fixed;
  inset:0;
  z-index:25;
  pointer-events:none;
  overflow:hidden;
  opacity:0;
  transition:opacity .8s ease;
}
.confettiLayer.show{opacity:1}
.confetti{
  position:absolute;
  top:-12px;
  width:10px;
  height:18px;
  border-radius:2px;
  animation:fall linear forwards;
  will-change:transform,opacity;
}
.finalTop{
  font-size:15px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  text-align:center;
}
.finalRecordBig{
  font-size:78px;
  line-height:1.02;
  text-align:center;
  margin:8px 0 12px;
  font-weight:900;
  letter-spacing:.08em;
  color:#fff;
  text-shadow:0 0 16px rgba(255,210,74,.14);
}
.finalSub{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-bottom:14px;
}
.finalCardGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.finalPlayers{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.finalPlayer{
  background:rgba(12,20,40,.9);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 12px;
}
.finalPlayerTop{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  margin-bottom:4px;
}
.finalName{
  font-weight:800;
  font-size:15px;
}
.finalMeta{
  font-size:12px;
  color:var(--muted);
}
.finalGrade{
  font-size:20px;
  font-weight:900;
  color:var(--gold);
}
.respinBtns{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}
.respinBtn{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.respinBtn[disabled]{
  opacity:.55;
  cursor:not-allowed;
}
.saveRow{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:2px;
}
@media (max-width:900px){
  .grid{grid-template-columns:1fr}
  .slotWrap{grid-template-columns:1fr}
  .finalRecordBig{font-size:56px}
}
@keyframes shake{
  10%,90%{transform:translate3d(-1px,0,0)}
  20%,80%{transform:translate3d(2px,0,0)}
  30%,50%,70%{transform:translate3d(-4px,0,0)}
  40%,60%{transform:translate3d(4px,0,0)}
}
@keyframes reelPulse{
  0%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-1px) scale(1.01)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes reelGlow{
  from{filter:brightness(1)}
  to{filter:brightness(1.2)}
}
@keyframes sheen{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}
@keyframes pickPulse{
  0%{transform:scale(1)}
  35%{transform:scale(1.04)}
  100%{transform:scale(1)}
}
@keyframes fall{
  0%{transform:translate3d(var(--x,0),-20px,0) rotate(0deg);opacity:1}
  100%{transform:translate3d(calc(var(--x,0) + var(--drift,0px)),110vh,0) rotate(720deg);opacity:0}
}
</style>

</div>

        seasonEl.textContent = seasons[tick % seasons.length];
        yearEl.textContent = current.year;
      } else if(respinMode === 'year'){
        seasonEl.textContent = current.sem;
        yearEl.textContent = years[tick % years.length];
      } else {
        seasonEl.textContent = seasons[tick % seasons.length];
        yearEl.textContent = years[tick % years.length];
      }

      seasonEl.style.transform = `translateY(${Math.sin(ts / 60) * 1.5}px) scale(${1 + progress * .02})`;
      yearEl.style.transform = `translateY(${Math.cos(ts / 55) * 1.5}px) scale(${1 + progress * .02})`;

      if(progress < 1){
        requestAnimationFrame(frame);
      } else {
        seasonEl.classList.remove('spinning');
        yearEl.classList.remove('spinning');
        el('mainCard').classList.remove('shake');
        seasonEl.style.transform = '';
        yearEl.style.transform = '';
        seasonEl.textContent = current.sem;
        yearEl.textContent = current.year;
        msg.textContent = `Wheel landed on ${current.sem} ${current.year}`;
        state = 'selecting';
        updateUI();
        done();
      }
    }

    msg.textContent = 'Spinning...';
    requestAnimationFrame(frame);
  }

  function renderRespinButtons(){
    const pool = el('poolBox');
    const shouldShow = !pool.classList.contains('hidden') && state === 'selecting';
    if(!shouldShow) return;

    const { yearOptions, seasonOptions } = getRespinOptions();
    const buttons = [];
    if(!seasonRespinUsed && seasonOptions.length) buttons.push(`<button type="button" class="primary respinBtn" data-action="respinSeason">↻ Season</button>`);
    if(!yearRespinUsed && yearOptions.length) buttons.push(`<button type="button" class="primary respinBtn" data-action="respinYear">↻ Year</button>`);

    const existing = pool.querySelector('.respinBtns');
    if(existing) existing.remove();
    if(buttons.length) pool.insertAdjacentHTML('afterbegin', `<div class="respinBtns">${buttons.join('')}</div>`);
  }

  function renderEligible(){
    const arr = available.filter(p => p.year === current.year && p.sem === current.sem);
    el('poolBox').innerHTML = `<div class="pickline"><strong>Eligible players</strong></div><div class="list">${arr.map(p => `<button type="button" data-action="pick" data-player="${p.name}">${p.name}</button>`).join('')}</div>`;
    el('poolBox').classList.remove('hidden');
    renderRespinButtons();
  }

  function showPool(){
    state = 'selecting';
    el('poolBox').classList.remove('hidden');
    renderEligible();
    el('spinBtn').disabled = true;
  }

  function applyRespin(target){
    if(state !== 'selecting' || !current) return;

    const { yearOptions, seasonOptions } = getRespinOptions();

    if(target === 'year'){
      if(yearRespinUsed || !yearOptions.length) return;
      yearRespinUsed = true;
      current.year = yearOptions[Math.floor(Math.random() * yearOptions.length)];
    }

    if(target === 'season'){
      if(seasonRespinUsed || !seasonOptions.length) return;
      seasonRespinUsed = true;
      current.sem = seasonOptions[Math.floor(Math.random() * seasonOptions.length)];
    }

    if(current.year === 2020 && current.sem === 'spring'){
      current.year = 2019;
      current.sem = 'spring';
    }

    el('poolBox').classList.add('hidden');
    respinMode = target;
    animateSpin(() => {
      respinMode = null;
      showPool();
    });
  }

  function highlightDrafted(){
    const board = el('drafted');
    board.classList.remove('pickPulse');
    void board.offsetWidth;
    board.classList.add('pickPulse');
  }

  function pickPlayer(name){
    if(state !== 'selecting') return;
    const idx = available.findIndex(x => x.name === name);
    if(idx < 0) return;
    const pick = available[idx];
    picks.push(pick);
    available.splice(idx, 1);
    step++;
    el('drafted').innerHTML = picks.map((p,i) => `<div class="badge">${i+1}. ${p.name} — ${p.year} ${p.sem}</div>`).join(' ');
    el('wheelBox').classList.add('hidden');
    el('poolBox').classList.add('hidden');
    el('spinBtn').disabled = false;
    state = 'idle';
    updateUI();
    highlightDrafted();
    if(step >= 4) reveal();
  }

  function fireConfetti(){
    confettiLayer.innerHTML = '';
    const colors = ['#ffd24a','#69f0ae','#7ec8ff','#ff7bd1','#ffffff'];
    for(let i=0;i<140;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.setProperty('--x', (Math.random()*8 - 4) + 'vw');
      c.style.setProperty('--drift', (Math.random()*20 - 10) + 'vw');
      c.style.animationDuration = (2.7 + Math.random()*1.7) + 's';
      c.style.animationDelay = (Math.random()*0.5) + 's';
      c.style.opacity = (0.8 + Math.random()*0.2).toFixed(2);
      confettiLayer.appendChild(c);
    }
    confettiLayer.classList.add('show');
    setTimeout(() => {
      confettiLayer.classList.remove('show');
      setTimeout(() => { confettiLayer.innerHTML = ''; }, 900);
    }, 3500);
  }

  function reveal(){
    el('game').classList.add('hidden');
    el('revealCard').classList.remove('hidden');
    el('revealCard').classList.add('show');
    const total = picks.reduce((a,p) => a + p.ovr, 0);
    const rec = record(total);
    el('finalRecord').textContent = rec;
    el('topTitle').textContent = rec;

    el('finalPlayers').innerHTML = picks.map((p,i) => `
      <div class="finalPlayer">
        <div class="finalPlayerTop">
          <div>
            <div class="finalName">${i+1}. ${p.name}</div>
            <div class="finalMeta">${p.year} ${p.sem}</div>
          </div>
          <div class="finalGrade">${grade(p.ovr)}</div>
        </div>
      </div>
    `).join('');

    fireConfetti();
  }

  function playAgain(){
    step = 0;
    current = null;
    picks = [];
    available = roster.slice();
    order = shuffle(['fall','spring','fall','spring']);
    state = 'idle';
    yearRespinUsed = false;
    seasonRespinUsed = false;
    respinMode = null;
    el('revealCard').classList.remove('show');
    setTimeout(() => el('revealCard').classList.add('hidden'), 700);
    el('startCard').classList.remove('hidden');
    el('game').classList.add('hidden');
    el('drafted').innerHTML = 'No players drafted yet.';
    el('status').textContent = '';
    el('wheelBox').classList.add('hidden');
    el('poolBox').classList.add('hidden');
    el('spinBtn').disabled = false;
    el('topTitle').textContent = '78-0';
    updateUI();
  }

  function saveImage(){
    const target = document.querySelector('.finalPanel');
    if(!target || typeof html2canvas === 'undefined') return;
    html2canvas(target, {backgroundColor:null, scale:2, useCORS:true}).then(canvas => {
      canvas.toBlob(blob => {
        if(!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '78-0-final.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    });
  }

  document.body.addEventListener('click', (e) => {
    const a = e.target.closest('[data-action]');
    if(!a) return;
    const act = a.dataset.action;
    if(act === 'start') startGame();
    if(act === 'spin') spinWheel();
    if(act === 'playAgain') playAgain();
    if(act === 'pick') pickPlayer(a.dataset.player);
    if(act === 'respinSeason') applyRespin('season');
    if(act === 'respinYear') applyRespin('year');
    if(act === 'saveImage') saveImage();
  });
});
</script>
</body>
</html>
